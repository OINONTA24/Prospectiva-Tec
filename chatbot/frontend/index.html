<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Settings Panel -->
  <aside id="settings-panel" class="settings-panel" aria-hidden="true">
    <div class="settings-header">
      <span class="settings-title">Configuración</span>
      <button id="close-settings" class="icon-btn" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="settings-body">

      <div class="setting-group">
        <label for="model-select" class="setting-label">Modelo</label>
        <select id="model-select" class="setting-select">
          <option value="gemma3:4b">gemma3:4b</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label">
          Temperature
          <span class="setting-value" id="temp-val">0.7</span>
        </label>
        <input type="range" id="temperature" min="0" max="1.2" step="0.05" value="0.7" class="slider">
        <div class="slider-limits"><span>0.0</span><span>1.2</span></div>
      </div>

      <div class="setting-group">
        <label class="setting-label">
          Top-p
          <span class="setting-value" id="topp-val">0.90</span>
        </label>
        <input type="range" id="top_p" min="0.1" max="1.0" step="0.05" value="0.9" class="slider">
        <div class="slider-limits"><span>0.1</span><span>1.0</span></div>
      </div>

      <div class="setting-group">
        <label for="num_predict" class="setting-label">
          Tokens a generar (num_predict)
          <span class="setting-value" id="predict-val">160</span>
        </label>
        <input type="range" id="num_predict" min="20" max="1000" step="10" value="160" class="slider">
        <div class="slider-limits"><span>20</span><span>1000</span></div>
      </div>

      <div class="setting-group">
        <label for="num_ctx" class="setting-label">Ventana de contexto (num_ctx)</label>
        <select id="num_ctx" class="setting-select">
          <option value="2048">2 048 tokens</option>
          <option value="4096" selected>4 096 tokens</option>
          <option value="8192">8 192 tokens</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label">
          Repeat penalty
          <span class="setting-value" id="penalty-val">1.10</span>
        </label>
        <input type="range" id="repeat_penalty" min="1.0" max="2.0" step="0.05" value="1.1" class="slider">
        <div class="slider-limits"><span>1.0</span><span>2.0</span></div>
      </div>

      <div class="setting-group">
        <label for="system_prompt" class="setting-label">System prompt</label>
        <textarea id="system_prompt" class="setting-textarea" rows="3">Eres un asistente académico claro, preciso y útil para estudiantes universitarios.</textarea>
      </div>

    </div>
  </aside>
  <div id="settings-overlay" class="settings-overlay"></div>

  <!-- Main layout -->
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 L2 7 L12 12 L22 7 Z"/>
          <path d="M2 17 L12 22 L22 17"/>
          <path d="M2 12 L12 17 L22 12"/>
        </svg>
        <span class="brand-name">Sage</span>
      </div>
      <div class="header-actions">
        <span class="model-pill" id="header-model">gemma3:4b</span>
        <button id="open-settings" class="icon-btn" aria-label="Configuración">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="new-chat" class="icon-btn" aria-label="Nueva conversación">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <main class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 L2 7 L12 12 L22 7 Z"/>
            <path d="M2 17 L12 22 L22 17"/>
            <path d="M2 12 L12 17 L22 12"/>
          </svg>
        </div>
        <h1 class="welcome-title">Sage</h1>
        <p class="welcome-sub">Chatbot LLM local · Ollama · gemma3:4b</p>
        <div class="chips">
          <button class="chip">¿Qué es un LLM y cómo funciona?</button>
          <button class="chip">Explica el concepto de temperatura en IA</button>
          <button class="chip">¿Qué diferencia hay entre GPT y Gemma?</button>
          <button class="chip">¿Cómo afecta num_ctx al rendimiento?</button>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="footer">
      <div class="composer">
        <textarea
          id="input"
          class="composer-input"
          placeholder="Escribe un mensaje…"
          rows="1"
          maxlength="4000"
        ></textarea>
        <button id="send" class="send-btn" aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="footer-note" id="status-note">Sage · Ollama local · <span id="status-indicator">●</span> listo</p>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
